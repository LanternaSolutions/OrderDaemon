stages:
  - package_assets

variables:
  PACKAGE_NAME: "order-daemon"
  PLUGIN_FILE_NAME: "$PACKAGE_NAME-$CI_COMMIT_TAG.zip"

package_artifacts:
  stage: package_assets
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  script:
    - echo "Packaging assets for release - $CI_COMMIT_TAG"
    - apk add --no-cache php php-phar php-openssl git unzip zip composer rsync
    - COMPOSER_MEMORY_LIMIT=-1 composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
    - echo "Creating ${PLUGIN_FILE_NAME} with root directory ${PACKAGE_NAME}/"
    - STAGING_DIR="$(mktemp -d)"
    - mkdir -p "$STAGING_DIR/$PACKAGE_NAME"
    - |
      rsync -a --prune-empty-dirs \
        --exclude='.*' \
        --exclude='*/.*' \
        --include='*/' \
        --include='README.txt' \
        --include='composer.json' \
        --include='*.php' \
        --include='*.js' \
        --include='*.css' \
        --include='**/*.php' \
        --include='**/*.js' \
        --include='**/*.css' \
        --include='vendor/***' \
        --include='languages/*.po' \
        --include='languages/*.mo' \
        --exclude='*' \
        ./ "$STAGING_DIR/$PACKAGE_NAME/"
    - |
      cd "$STAGING_DIR" && \
      zip -r "$CI_PROJECT_DIR/$PLUGIN_FILE_NAME" "$PACKAGE_NAME" && \
      cd "$CI_PROJECT_DIR"
    - rm -rf "$STAGING_DIR"
    - echo "Verifying the archive exists"
    - ls -l "$PLUGIN_FILE_NAME"
    - test -f "$PLUGIN_FILE_NAME"
  artifacts:
    name: "$PLUGIN_FILE_NAME"
    paths:
      - "$PLUGIN_FILE_NAME"
  release:
    name: "$CI_COMMIT_TAG"
    description: "Automated release for $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    ref: "$CI_COMMIT_SHA"
    assets:
      links:
        - name: "$PLUGIN_FILE_NAME"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/${PLUGIN_FILE_NAME}"
          link_type: package