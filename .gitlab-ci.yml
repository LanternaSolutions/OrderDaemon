stages:
  - package
  - deploy

variables:
  PACKAGE_NAME: "order-daemon"
  SVN_URL: "https://plugins.svn.wordpress.org/order-daemon"
  GITHUB_REPO: "git@github.com:LanternaSolutions/OrderDaemon.git"

# ─── Package zip artifact ─────────────────────────────────────────────────────
# Triggered by: ./update-version.sh patch && git push && git push --tags
package_artifacts:
  stage: package
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  script:
    - PLUGIN_FILE_NAME="$PACKAGE_NAME-$CI_COMMIT_TAG.zip"
    - echo "Packaging $PLUGIN_FILE_NAME"
    - apk add --no-cache php php-phar php-openssl git unzip zip composer rsync
    - COMPOSER_MEMORY_LIMIT=-1 composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
    - STAGING_DIR="$(mktemp -d)"
    - mkdir -p "$STAGING_DIR/$PACKAGE_NAME"
    - |
      rsync -a --prune-empty-dirs \
        --exclude='.*' \
        --exclude='*/.*' \
        --exclude='notes/***' \
        --include='*/' \
        --include='README.txt' \
        --include='composer.json' \
        --include='*.php' \
        --include='*.js' \
        --include='*.css' \
        --include='**/*.php' \
        --include='**/*.js' \
        --include='**/*.css' \
        --include='vendor/***' \
        --include='languages/*.po' \
        --include='languages/*.mo' \
        --include='languages/*.php' \
        --exclude='*' \
        ./ "$STAGING_DIR/$PACKAGE_NAME/"
    - cd "$STAGING_DIR" && zip -r "$CI_PROJECT_DIR/$PLUGIN_FILE_NAME" "$PACKAGE_NAME"
    - rm -rf "$STAGING_DIR"
    - ls -l "$CI_PROJECT_DIR/$PLUGIN_FILE_NAME"
    - test -f "$CI_PROJECT_DIR/$PLUGIN_FILE_NAME"
  artifacts:
    name: "$PACKAGE_NAME-$CI_COMMIT_TAG"
    paths:
      - "$PACKAGE_NAME-$CI_COMMIT_TAG.zip"
  release:
    name: "$CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    ref: "$CI_COMMIT_SHA"
    assets:
      links:
        - name: "$PACKAGE_NAME-$CI_COMMIT_TAG.zip"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/${PACKAGE_NAME}-${CI_COMMIT_TAG}.zip"
          link_type: package

# ─── Deploy to WordPress.org SVN ──────────────────────────────────────────────
# Required CI variables (Settings → CI/CD → Variables, mark as Masked + Protected):
#   WP_SVN_USERNAME  — your wordpress.org username
#   WP_SVN_PASSWORD  — your wordpress.org password
#
# SVN layout at plugins.svn.wordpress.org/order-daemon/:
#   trunk/   ← live plugin files (same content as the zip)
#   tags/    ← one copy per release, e.g. tags/1.3.24/
#   assets/  ← WP.org directory page assets only (NOT bundled in the plugin zip):
#              banner-772x250.png, banner-1544x500.png
#              icon-128x128.png, icon-256x256.png, icon.svg
#              screenshot-1.png, screenshot-2.png, ...
deploy_svn:
  stage: deploy
  image: alpine:latest
  needs: ["package_artifacts"]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  script:
    - PLUGIN_VERSION="${CI_COMMIT_TAG#v}"
    - echo "Deploying $PLUGIN_VERSION to WordPress.org SVN"
    - apk add --no-cache subversion php php-phar php-openssl git unzip composer rsync

    # Install prod deps (no dev)
    - COMPOSER_MEMORY_LIMIT=-1 composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

    # Sparse SVN checkout — only fetch trunk and assets, skip downloading all tags
    - SVN_DIR="$(mktemp -d)"
    - svn checkout --depth immediates "$SVN_URL" "$SVN_DIR"
    - svn update --set-depth infinity "$SVN_DIR/trunk"
    - svn update --set-depth immediates "$SVN_DIR/assets"

    # Sync plugin files into trunk/ (--delete removes files dropped from the plugin)
    - |
      rsync -a --delete --prune-empty-dirs \
        --exclude='.*' \
        --exclude='*/.*' \
        --exclude='notes/***' \
        --include='*/' \
        --include='README.txt' \
        --include='composer.json' \
        --include='*.php' \
        --include='*.js' \
        --include='*.css' \
        --include='**/*.php' \
        --include='**/*.js' \
        --include='**/*.css' \
        --include='vendor/***' \
        --include='languages/*.po' \
        --include='languages/*.mo' \
        --include='languages/*.php' \
        --exclude='*' \
        ./ "$SVN_DIR/trunk/"

    # Sync WP.org directory page assets into svn/assets/
    # These are root-level images in git assets/ — NOT the css/ or js/ subdirs
    - |
      rsync -a \
        assets/banner-*.png \
        assets/icon-*.png \
        assets/icon.svg \
        assets/screenshot-*.png \
        "$SVN_DIR/assets/"

    # Stage SVN changes: new files (?) and locally-deleted files (!)
    - cd "$SVN_DIR"
    - svn status | grep "^?" | awk '{print $2}' | xargs -r svn add --force
    - svn status | grep "^!" | awk '{print $2}' | xargs -r svn delete

    # Create a tag as a copy of the updated trunk
    - |
      if svn info "tags/$PLUGIN_VERSION" > /dev/null 2>&1; then
        echo "Tag $PLUGIN_VERSION already exists in SVN, skipping"
      else
        svn copy trunk "tags/$PLUGIN_VERSION"
      fi

    # Commit trunk + assets + new tag in one transaction
    - |
      svn commit \
        --username "$WP_SVN_USERNAME" \
        --password "$WP_SVN_PASSWORD" \
        --message "Release $PLUGIN_VERSION" \
        --no-auth-cache \
        --non-interactive

    - echo "SVN deploy complete: $PLUGIN_VERSION"

# ─── Mirror clean copy to public GitHub repo ──────────────────────────────────
# Runs on every push to main. Pushes a filtered history to GitHub, excluding:
#   notes/           — internal dev documentation
#   *.bak            — editor backup files
#   *.code-workspace — VSCode workspace files
#
# Required CI variable (Settings → CI/CD → Variables, mark as Masked + Protected):
#   GITHUB_DEPLOY_KEY — SSH private key with write access to the GitHub repo.
#                       Add the corresponding public key as a Deploy Key in:
#                       GitHub → repo Settings → Deploy keys → Allow write access
push_github:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - apk add --no-cache git openssh-client python3 py3-pip
    - pip install git-filter-repo --break-system-packages

    # Configure SSH for GitHub
    - mkdir -p ~/.ssh
    - echo "$GITHUB_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan github.com >> ~/.ssh/known_hosts

    # Local clone gives filter-repo a clean working copy to rewrite
    - git clone --local "$CI_PROJECT_DIR" /tmp/github-mirror
    - cd /tmp/github-mirror
    - git remote remove origin

    # Rewrite history to strip private/dev-only paths
    - |
      git filter-repo --invert-paths \
        --path notes/ \
        --path-glob '*.bak' \
        --path-glob '*.code-workspace'

    # Force-push filtered history to GitHub
    # (SHAs differ from private repo because history was rewritten — this is expected)
    - git remote add github "$GITHUB_REPO"
    - git push --force github main

    - echo "GitHub mirror updated"
